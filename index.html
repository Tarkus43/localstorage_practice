<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/css/index.min.css">
    <title>to-do app</title>
</head>
<body>
    <div class="todo_wrapper">


        <button class="todo_create_btn" id="create_btn">+</button>
        <div class="todo_form_wrapper hidden" id="todoFormWrapper">
            <form class="todo_form" id="todoForm">
                <div class="todo_input_wrapper grid_item-1">
                    <!-- <label for="title">Title</label> -->
                    <input placeholder="Enter name of todo" class="todo_input todo_form_title" type="text" name="title" id="titleForm">
                </div>
                <div class="todo_input_wrapper grid_item-2">
                    <!-- <label for="description">Description</label> -->
                    <input placeholder="Enter description" class="todo_input todo_form_description" type="text" name="description" id="descriptionForm">
                </div>
                <button id='submit' class="todo_submit_btn grid_item-3" type="submit">create todo</button>
            </form>
        </div>


        <ul class="todo_list" id="todoList">
            <li class="todo_item">
                <h3 class="todo_item_title">TODO EXAMPLE</h3>
                <p class="todo_item_description">description</p>
            </li>
        </ul>

    </div>
    
<script src="script.js" type="module" ></script>
</body>
</html>
