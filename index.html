<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/css/index.min.css">
    <title>to-do app</title>
</head>
<body>
    <div class="todo_wrapper">


        <button class="todo_create_btn" id="create_btn">+</button>
        <div class="todo_form_wrapper hidden" id="todoForm">
            <form class="todo_form">
                <label for="title">Title</label>
                <input type="text" name="title" id="titleForm">
                <label for="description">Description</label>
                <input type="text" name="description" id="descriptionForm">
                <button type="submit">create todo</button>
            </form>
        </div>


        <ul class="todo_list" id="todoList">
            <li class="todo_item">
                <h3 class="todo_item_title">TODO EXAMPLE</h3>
                <p class="todo_item_description">description</p>
            </li>
        </ul>

    </div>
    
<script src="script.js" ></script>
</body>
</html>
